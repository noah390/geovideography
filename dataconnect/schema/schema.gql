# Geovideography Global Grid Schema
# Hierarchical Relational Model for Sovereign Intelligence

type Country @table {
  id: UUID! @default(expr: "uuid_generate_v4()")
  name: String! @index
  flagUrl: String!
  historySummary: String!
  populationCount: Int!
}

type LGA @table {
  id: UUID! @default(expr: "uuid_generate_v4()")
  name: String! @index
  country: Country!
}

type Town @table {
  id: UUID! @default(expr: "uuid_generate_v4()")
  name: String! @index
  lga: LGA!
}

type Street @table {
  id: UUID! @default(expr: "uuid_generate_v4()")
  name: String! @index
  town: Town!
  videoUrl: String
  treeCount: Int
  roadCondition: String
  healthScore: Float
  # Semantic embedding for AI-powered discovery (e.g., 'find me leafy streets')
  descriptionEmbedding: Vector @size(768)
}
